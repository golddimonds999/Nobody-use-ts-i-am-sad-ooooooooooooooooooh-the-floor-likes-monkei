<!DOCTYPE html>
<html>
<head>
  <title>Carson SMP Games</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #181818;
      color: white;
      font-family: 'Montserrat', Arial, sans-serif;
      text-align: center;

      /* prevents flicker */
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    body.loaded {
      opacity: 1;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      margin: 0;
      font-size: 60px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 36px;
    }

    /* GRID */
    .games {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .game-card {
      background: #222;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .game-card:hover {
      transform: scale(1.05);
    }

    .game-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .game-title {
      padding: 10px;
      font-size: 18px;
    }

    /* POPUP */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      width: 80%;
      height: 80%;
      background: #000;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 25px;
      cursor: pointer;
      z-index: 10;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>Carson SMP Games</h1>
    <div class="subtitle">By Dankle and Really Cool Guy</div>
  </header>

  <!-- GAME GRID -->
  <div class="games">

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 1</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 2</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 3</div>
    </div>

    <div class="game-card" onclick="openGame('https://example.com')">
      <img src="https://via.placeholder.com/300x140">
      <div class="game-title">Game 4</div>
    </div>

    <!-- add more for more rows -->

  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <span class="close-btn" onclick="closeGame()">✖</span>
      <iframe id="gameFrame"></iframe>
    </div>
  </div>

  <script>
    function openGame(url) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("gameFrame").src = url;
    }

    function closeGame() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("gameFrame").src = "";
    }

    // fix flicker on load
    window.onload = () => {
      document.body.classList.add("loaded");
    };
  </script>

</body>
</html>
